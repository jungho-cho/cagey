  .controls-panel {

<script>
'use strict';

/* ─────────────────────────────────────────
   PRNG (mulberry32)
───────────────────────────────────────── */
function mulberry32(seed) {
  return function () {
    seed |= 0; seed = seed + 0x6D2B79F5 | 0;
    let t = Math.imul(seed ^ seed >>> 15, 1 | seed);
    t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
    return ((t ^ t >>> 14) >>> 0) / 4294967296;
  };
}
function randInt(rng, min, max) { return min + Math.floor(rng() * (max - min + 1)); }
function shuffle(arr, rng) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(rng() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

/* ─────────────────────────────────────────
   SOLVER
───────────────────────────────────────── */
function checkCage(cage, grid) {
  const vals = cage.cells.map(i => grid[i]);
  const filled = vals.filter(v => v !== 0);
  const empty = vals.length - filled.length;
  if (cage.op === '+') {
    const sum = filled.reduce((a, b) => a + b, 0);
    if (empty === 0) return sum === cage.target ? 'satisfied' : 'impossible';
    if (sum >= cage.target) return 'impossible';
    return 'ok';
  } else {
    const prod = filled.reduce((a, b) => a * b, 1);
    if (empty === 0) return prod === cage.target ? 'satisfied' : 'impossible';
    if (cage.target % prod !== 0) return 'impossible';
    return 'ok';
  }
}

function buildCellCageMap(puzzle) {
  const map = new Array(puzzle.size * puzzle.size).fill(-1);
  puzzle.cages.forEach((cage, ci) => cage.cells.forEach(idx => { map[idx] = ci; }));
  return map;
}

function _solve(grid, pos, puzzle, cellCageMap, rowUsed, colUsed, solutions, stopAt, state) {
  if (solutions.length >= stopAt) return;
  if (++state.nodes > state.nodeLimit) return;
  const { size } = puzzle;
  const total = size * size;
  while (pos < total && grid[pos] !== 0) pos++;
  if (pos === total) {
    for (const cage of puzzle.cages) {
      if (checkCage(cage, grid) !== 'satisfied') return;
    }
    solutions.push(grid.slice());
    return;
  }
  const row = (pos / size) | 0, col = pos % size;
  const cage = puzzle.cages[cellCageMap[pos]];
  for (let val = 1; val <= size; val++) {
    const bit = 1 << val;
    if (rowUsed[row] & bit) continue;
    if (colUsed[col] & bit) continue;
    grid[pos] = val; rowUsed[row] |= bit; colUsed[col] |= bit;
    if (checkCage(cage, grid) !== 'impossible') {
      _solve(grid, pos + 1, puzzle, cellCageMap, rowUsed, colUsed, solutions, stopAt, state);
      if (solutions.length >= stopAt || state.nodes > state.nodeLimit) {
        grid[pos] = 0; rowUsed[row] &= ~bit; colUsed[col] &= ~bit; return;
      }
    }
    grid[pos] = 0; rowUsed[row] &= ~bit; colUsed[col] &= ~bit;
  }
}

function solve(puzzle, nodeLimit) {
  nodeLimit = nodeLimit || Infinity;
  const { size } = puzzle;
  const grid = new Array(size * size).fill(0);
  const cellCageMap = buildCellCageMap(puzzle);
  const rowUsed = new Array(size).fill(0), colUsed = new Array(size).fill(0);
  const solutions = [];
  const state = { nodes: 0, nodeLimit };
  _solve(grid, 0, puzzle, cellCageMap, rowUsed, colUsed, solutions, 2, state);
  if (state.nodes > state.nodeLimit) return false;
  if (solutions.length === 0) return null;
  if (solutions.length === 1) return solutions[0];
  return false;
}

/* ── Cage-Only Solver (no row/col rules — what the player sees) ── */
function checkCageTight(cage, grid, maxVal) {
  const vals = cage.cells.map(i => grid[i]);
  const filled = vals.filter(v => v !== 0);
  const empty = vals.length - filled.length;
  if (cage.op === '+') {
    const sum = filled.reduce((a, b) => a + b, 0);
    if (empty === 0) return sum === cage.target ? 'satisfied' : 'impossible';
    if (sum >= cage.target) return 'impossible';
    if (sum + empty > cage.target) return 'impossible';
    if (sum + empty * maxVal < cage.target) return 'impossible';
    return 'ok';
  } else {
    const prod = filled.reduce((a, b) => a * b, 1);
    if (empty === 0) return prod === cage.target ? 'satisfied' : 'impossible';
    if (cage.target % prod !== 0) return 'impossible';
    if (prod * Math.pow(maxVal, empty) < cage.target) return 'impossible';
    if (prod > cage.target) return 'impossible';
    return 'ok';
  }
}

function _solveCageOnly(grid, pos, puzzle, cellCageMap, solutions, stopAt, state) {
  if (solutions.length >= stopAt) return;
  if (++state.nodes > state.nodeLimit) return;
  const { size } = puzzle;
  const total = size * size;
  while (pos < total && grid[pos] !== 0) pos++;
  if (pos === total) {
    for (const cage of puzzle.cages) {
      if (checkCage(cage, grid) !== 'satisfied') return;
    }
    solutions.push(grid.slice());
    return;
  }
  const cage = puzzle.cages[cellCageMap[pos]];
  for (let val = 1; val <= size; val++) {
    grid[pos] = val;
    if (checkCageTight(cage, grid, size) !== 'impossible') {
      _solveCageOnly(grid, pos + 1, puzzle, cellCageMap, solutions, stopAt, state);
      if (solutions.length >= stopAt || state.nodes > state.nodeLimit) {
        grid[pos] = 0; return;
      }
    }
    grid[pos] = 0;
  }
}

function verifyCageOnlyUnique(puzzle, nodeLimit) {
  const { size } = puzzle;
  const grid = new Array(size * size).fill(0);
  const cellCageMap = buildCellCageMap(puzzle);
  const solutions = [];
  const state = { nodes: 0, nodeLimit: nodeLimit || 2000000 };
  _solveCageOnly(grid, 0, puzzle, cellCageMap, solutions, 2, state);
  return solutions.length === 1 && state.nodes <= state.nodeLimit;
}

/* ─────────────────────────────────────────
   GENERATOR
───────────────────────────────────────── */
const DIFFICULTY = {
  easy:   { size: 4, ops: ['+'],       cageMin: 2, cageMax: 3, label: 'Easy',   gridLabel: '4×4' },
  medium: { size: 5, ops: ['+', '*'],  cageMin: 2, cageMax: 3, label: 'Medium', gridLabel: '5×5' },
  hard:   { size: 6, ops: ['+', '*'],  cageMin: 2, cageMax: 4, label: 'Hard',   gridLabel: '6×6' },
  expert: { size: 8, ops: ['+', '*'],  cageMin: 2, cageMax: 4, label: 'Expert', gridLabel: '8×8' },
};

function generateLatinSquare(size, rng) {
  const grid = [];
  for (let r = 0; r < size; r++) {
    const row = [];
    for (let c = 0; c < size; c++) row.push(((r + c) % size) + 1);
    grid.push(row);
  }
  shuffle(grid, rng);
  const colPerm = shuffle(Array.from({ length: size }, (_, i) => i), rng);
  for (let r = 0; r < size; r++) {
    const orig = grid[r].slice();
    for (let c = 0; c < size; c++) grid[r][c] = orig[colPerm[c]];
  }
  const valPerm = shuffle(Array.from({ length: size }, (_, i) => i + 1), rng);
  for (let r = 0; r < size; r++)
    for (let c = 0; c < size; c++) grid[r][c] = valPerm[grid[r][c] - 1];
  return grid.flat();
}

function partitionIntoCages(size, cageMin, cageMax, rng) {
  const total = size * size;
  const assigned = new Array(total).fill(false);
  const cages = [];
  const order = shuffle(Array.from({ length: total }, (_, i) => i), rng);
  for (const start of order) {
    if (assigned[start]) continue;
    const targetSize = randInt(rng, cageMin, cageMax);
    const cage = [start];
    assigned[start] = true;
    const frontier = [start];
    while (cage.length < targetSize && frontier.length > 0) {
      const fi = (rng() * frontier.length) | 0;
      const cell = frontier[fi]; frontier.splice(fi, 1);
      const r = (cell / size) | 0, c = cell % size;
      const neighbors = [];
      if (r > 0)        neighbors.push(cell - size);
      if (r < size - 1) neighbors.push(cell + size);
      if (c > 0)        neighbors.push(cell - 1);
      if (c < size - 1) neighbors.push(cell + 1);
      shuffle(neighbors, rng);
      for (const n of neighbors) {
        if (!assigned[n] && cage.length < targetSize) {
          assigned[n] = true; cage.push(n); frontier.push(n);
        }
      }
    }
    cages.push(cage);
  }
  // Merge singleton cages (size < cageMin) into adjacent cages
  for (let ci = cages.length - 1; ci >= 0; ci--) {
    if (cages[ci].length >= cageMin) continue;
    const cellIdx = cages[ci][0];
    const r = (cellIdx / size) | 0, c = cellIdx % size;
    const neighbors = [];
    if (r > 0)        neighbors.push(cellIdx - size);
    if (r < size - 1) neighbors.push(cellIdx + size);
    if (c > 0)        neighbors.push(cellIdx - 1);
    if (c < size - 1) neighbors.push(cellIdx + 1);
    let merged = false;
    for (const pass of [false, true]) { // first pass: prefer cages under cageMax; second: any
      for (const n of neighbors) {
        const ti = cages.findIndex(cg => cg.includes(n));
        if (ti >= 0 && ti !== ci && (pass || cages[ti].length < cageMax)) {
          cages[ti].push(...cages[ci]);
          cages.splice(ci, 1);
          merged = true; break;
        }
      }
      if (merged) break;
    }
  }
  return cages;
}

function generate(difficulty, seed) {
  const cfg = DIFFICULTY[difficulty];
  const baseSeed = seed !== undefined ? seed : (Math.random() * 0xFFFFFFFF) >>> 0;
  const deadline = Date.now() + 2500;
  for (let attempt = 0; attempt < 80; attempt++) {
    if (Date.now() > deadline) break;
    const rng = mulberry32(baseSeed ^ (attempt * 2654435761));
    const solution = generateLatinSquare(cfg.size, rng);
    const cellGroups = partitionIntoCages(cfg.size, cfg.cageMin, cfg.cageMax, rng);
    const cages = cellGroups.map(cells => {
      const vals = cells.map(i => solution[i]);
      const prod = vals.reduce((a, b) => a * b, 1);
      const op = cfg.ops.length > 1 && prod <= 500 && rng() < 0.4 ? '*' : '+';
      const target = op === '+' ? vals.reduce((a, b) => a + b, 0) : prod;
      return { cells, op, target };
    });
    const puzzle = { size: cfg.size, cages };
    const result = solve(puzzle, 500000);
    if (result !== null && result !== false) return { ...puzzle, solution };
  }
  return null;
}

/* ─────────────────────────────────────────
   DAILY CHALLENGE
───────────────────────────────────────── */
const DIFFS = ['easy', 'medium', 'hard', 'expert'];
const LAUNCH_DATE = new Date('2026-04-01T00:00:00Z');

function getDailyInfo() {
  const now = new Date();
  const utcNow = Date.UTC(now.getUTCFullYear(), now.getUTCMonth(), now.getUTCDate());
  const dayIndex = Math.floor((utcNow - LAUNCH_DATE.getTime()) / 86400000);
  const puzzleNum = Math.max(1, dayIndex + 1);
  const diff = DIFFS[((dayIndex % 4) + 4) % 4]; // safe for negative dayIndex (pre-launch)
  const dateStr = now.toISOString().slice(0, 10).replace(/-/g, '');
  const seed = mulberry32(parseInt(dateStr))();
  return { puzzleNum, diff, seed: (seed * 0xFFFFFFFF) >>> 0 };
}

/* ─────────────────────────────────────────
   STREAK (localStorage)
───────────────────────────────────────── */
function getStreak() {
  try {
    const data = JSON.parse(localStorage.getItem('cagey_streak') || '{}');
    const today = new Date().toISOString().slice(0, 10);
    const yesterday = new Date(Date.now() - 86400000).toISOString().slice(0, 10);
    if (data.lastDate === today) return data.count || 0;
    if (data.lastDate === yesterday) return data.count || 0;
    return 0;
  } catch { return 0; }
}

function incrementStreak() {
  try {
    const today = new Date().toISOString().slice(0, 10);
    const data = JSON.parse(localStorage.getItem('cagey_streak') || '{}');
    if (data.lastDate === today) return data.count;
    const yesterday = new Date(Date.now() - 86400000).toISOString().slice(0, 10);
    const count = data.lastDate === yesterday ? (data.count || 0) + 1 : 1;
    localStorage.setItem('cagey_streak', JSON.stringify({ lastDate: today, count }));
    return count;
  } catch { return 1; }
}

/* ─────────────────────────────────────────
   SHARE TEXT
───────────────────────────────────────── */
function formatTime(secs) {
  const m = (secs / 60) | 0;
  const s = String(secs % 60).padStart(2, '0');
  return `${m}:${s}`;
}

function buildShareText(puzzleNum, diffLabel, timeSecs, hintsUsed, streak, hintMask, size) {
  // Emoji grid: ■ = solved without hint, □ = solved with hint used in that cage
  let emojiGrid = '';
  for (let r = 0; r < size; r++) {
    for (let c = 0; c < size; c++) {
      emojiGrid += hintMask[r * size + c] ? '□' : '■';
    }
    if (r < size - 1) emojiGrid += '\n';
  }
  const timeStr = formatTime(timeSecs);
  const hintStr = hintsUsed === 0 ? 'No hints' : `${hintsUsed} hint${hintsUsed > 1 ? 's' : ''} used`;
  return `Cagey #${puzzleNum} [${diffLabel}] ✓ ${timeStr}\n${hintStr} · ${streak}🔥\ncagey.app\n\n${emojiGrid}`;
}

/* ─────────────────────────────────────────
   GRID RENDERER
───────────────────────────────────────── */
function computeCellBorders(puzzle) {
  const { size, cages } = puzzle;
  const total = size * size;
  const cellCageMap = new Array(total).fill(-1);
  cages.forEach((cage, ci) => cage.cells.forEach(idx => { cellCageMap[idx] = ci; }));

  // For each cell, determine which edges are cage boundaries
  return Array.from({ length: total }, (_, idx) => {
    const r = (idx / size) | 0, c = idx % size;
    const ci = cellCageMap[idx];
    const bt = r === 0         || cellCageMap[idx - size] !== ci;
    const bb = r === size - 1  || cellCageMap[idx + size] !== ci;
    const bl = c === 0         || cellCageMap[idx - 1]    !== ci;
    const br = c === size - 1  || cellCageMap[idx + 1]    !== ci;
    return { bt, bb, bl, br };
  });
}

function getCageHintLabel(cage) {
  const sym = cage.op === '+' ? '+' : '×';
  return `${cage.target}${sym}`;
}

function getGridMaxSize() {
  const w = window.innerWidth;
  if (w >= 1024) return Math.min(window.innerHeight - 200, 560);
  if (w >= 768)  return Math.min(w - 64, 500);
  return Math.min(w - 32, 380);
}

function renderGrid(puzzle, cellBorders, state) {
  const wrap = document.getElementById('grid-wrap');
  const { size } = puzzle;

  // Responsive cell size
  const maxWrap = getGridMaxSize();
  const CELL = Math.floor(maxWrap / size);
  const GRID = CELL * size;

  wrap.style.width = GRID + 'px';
  wrap.style.height = GRID + 'px';

  // Identify which cell has the cage hint label (top-left cell in each cage)
  const cageHintCell = new Map();
  puzzle.cages.forEach((cage, ci) => {
    const topLeft = cage.cells.reduce((best, idx) => {
      const br = (idx / size) | 0, bc = idx % size;
      const br2 = (best / size) | 0, bc2 = best % size;
      return br < br2 || (br === br2 && bc < bc2) ? idx : best;
    }, cage.cells[0]);
    cageHintCell.set(topLeft, ci);
  });

  wrap.innerHTML = '';

  for (let idx = 0; idx < size * size; idx++) {
    const r = (idx / size) | 0, c = idx % size;
    const cell = document.createElement('div');
    cell.className = 'grid-cell';
    cell.dataset.idx = idx;
    cell.style.width = CELL + 'px';
    cell.style.height = CELL + 'px';
    cell.style.top = (r * CELL) + 'px';
    cell.style.left = (c * CELL) + 'px';

    // Cage borders
    const b = cellBorders[idx];
    const THIN = '1px solid #ccc';
    const THICK = '2.5px solid #222';
    cell.style.borderTop    = b.bt ? THICK : THIN;
    cell.style.borderBottom = b.bb ? THICK : THIN;
    cell.style.borderLeft   = b.bl ? THICK : THIN;
    cell.style.borderRight  = b.br ? THICK : THIN;

    // Cage hint label
    if (cageHintCell.has(idx)) {
      const ci = cageHintCell.get(idx);
      const label = document.createElement('span');
      label.className = 'hint-label';
      label.textContent = getCageHintLabel(puzzle.cages[ci]);
      label.style.fontSize = Math.max(8, CELL * 0.2) + 'px';
      cell.appendChild(label);
    }

    // Cell value
    const val = state.grid[idx];
    if (val !== 0) {
      const span = document.createElement('span');
      span.textContent = val;
      span.style.fontSize = Math.max(14, CELL * 0.45) + 'px';
      cell.appendChild(span);
    }

    cell.addEventListener('click', () => selectCell(idx));
    wrap.appendChild(cell);
  }
}

/* ─────────────────────────────────────────
   NUMPAD RENDERER
───────────────────────────────────────── */
function renderNumpad(size) {
  const pad = document.getElementById('numpad');
  const desktop = window.innerWidth >= 1024;
  // Desktop: 3-column grid; mobile/tablet: all keys in one row
  const cols = desktop ? 3 : (size + 1);
  pad.style.gridTemplateColumns = `repeat(${cols}, 1fr)`;
  if (desktop) {
    pad.style.width = '';  // let CSS (.controls-panel) control width
  } else {
    const w = window.innerWidth;
    pad.style.width = (w >= 768 ? Math.min(w - 64, 500) : Math.min(w - 32, 380)) + 'px';
  }
  pad.innerHTML = '';
  for (let v = 1; v <= size; v++) {
    const btn = document.createElement('div');
    btn.className = 'num-key';
    btn.textContent = v;
    btn.dataset.val = v;
    btn.addEventListener('click', () => handleNumKey(v));
    pad.appendChild(btn);
  }
  const del = document.createElement('div');
  del.className = 'num-key del';
  del.textContent = '⌫';
  del.addEventListener('click', () => handleNumKey(0));
  pad.appendChild(del);
}

/* ─────────────────────────────────────────
   GAME STATE
───────────────────────────────────────── */
let currentPuzzle = null;
let currentState = null;
let selectedCell = -1;
let currentDiff = 'easy';
let puzzleNum = 1;
let timerStart = null;
let timerInterval = null;
let hintsUsed = 0;
let hintMask = [];
let gameComplete = false;
const UNDO_LIMIT = 50;
let undoStack = [];
let grid = [];

function createState(puzzle) {
  grid = new Array(puzzle.size * puzzle.size).fill(0);
  undoStack = [];
  hintMask = new Array(puzzle.size * puzzle.size).fill(false);
  hintsUsed = 0;
  gameComplete = false;
  selectedCell = -1;
}

function getCageMap(puzzle) {
  const map = new Array(puzzle.size * puzzle.size).fill(-1);
  puzzle.cages.forEach((cage, ci) => cage.cells.forEach(i => { map[i] = ci; }));
  return map;
}

function getCageStatus(puzzle, cageMap, ci) {
  const cage = puzzle.cages[ci];
  const vals = cage.cells.map(i => grid[i]);
  if (vals.some(v => v === 0)) return 'incomplete';
  const result = cage.op === '+' ? vals.reduce((a, b) => a + b, 0) : vals.reduce((a, b) => a * b, 1);
  return result === cage.target ? 'correct' : 'incorrect';
}

function isPuzzleComplete(puzzle, cageMap) {
  return puzzle.cages.every((_, ci) => getCageStatus(puzzle, cageMap, ci) === 'correct');
}

/* ─────────────────────────────────────────
   CELL UPDATE + RENDER
───────────────────────────────────────── */
let cageBorders = null;
let cageMap = null;

function updateCellDisplay(idx) {
  const cell = document.querySelector(`.grid-cell[data-idx="${idx}"]`);
  if (!cell) return;
  const val = grid[idx];

  // Update value text (preserve hint-label span)
  const hintLabel = cell.querySelector('.hint-label');
  const valSpan = cell.querySelector('span:not(.hint-label)');

  if (val !== 0) {
    if (valSpan) {
      valSpan.textContent = val;
    } else {
      const span = document.createElement('span');
      span.textContent = val;
      const CELL = parseInt(cell.style.width);
      span.style.fontSize = Math.max(14, CELL * 0.45) + 'px';
      cell.appendChild(span);
    }
  } else {
    if (valSpan) valSpan.remove();
  }

  // Update status class
  const ci = cageMap[idx];
  const status = getCageStatus(currentPuzzle, cageMap, ci);
  cell.classList.remove('cage-correct', 'cage-incorrect', 'cage-hint');
  if (hintMask[idx]) {
    cell.classList.add('cage-hint');
  } else if (status === 'correct') {
    cell.classList.add('cage-correct');
  } else if (status === 'incorrect') {
    cell.classList.add('cage-incorrect');
  }

  // Update selection
  cell.classList.toggle('selected', idx === selectedCell && !hintMask[idx] && status !== 'correct');
}

function refreshAllCells() {
  const total = currentPuzzle.size * currentPuzzle.size;
  for (let i = 0; i < total; i++) updateCellDisplay(i);
}

function selectCell(idx) {
  if (hintMask[idx]) return; // hint cells are locked
  if (cageMap && getCageStatus(currentPuzzle, cageMap, cageMap[idx]) === 'correct') return; // lock solved cages
  const prev = selectedCell;
  selectedCell = idx;
  if (prev >= 0) updateCellDisplay(prev);
  updateCellDisplay(idx);
}

function handleNumKey(val) {
  if (selectedCell < 0 || gameComplete) return;
  if (hintMask[selectedCell]) return;

  undoStack.push({ idx: selectedCell, prev: grid[selectedCell] });
  if (undoStack.length > UNDO_LIMIT) undoStack.shift();
  grid[selectedCell] = val;

  // Update all cells in same cage for status refresh
  const ci = cageMap[selectedCell];
  currentPuzzle.cages[ci].cells.forEach(i => updateCellDisplay(i));

  // Check completion
  if (isPuzzleComplete(currentPuzzle, cageMap)) {
    clearInterval(timerInterval);
    gameComplete = true;
    setTimeout(showClearScreen, 400);
  }
}

function handleUndo() {
  if (undoStack.length === 0 || gameComplete) return;
  const { idx, prev } = undoStack.pop();
  grid[idx] = prev;
  const ci = cageMap[idx];
  currentPuzzle.cages[ci].cells.forEach(i => updateCellDisplay(i));
}

/* ─────────────────────────────────────────
   HINT
───────────────────────────────────────── */
const MAX_HINTS = 3;

function solveFromCurrentGrid(puzzle) {
  // Find a cage-valid completion starting from the player's current grid state.
  // Uses cage-only solver (no row/col rules) so the hint is compatible with
  // any valid solution the player might be building toward.
  const { size } = puzzle;
  const total = size * size;
  const testGrid = grid.slice(); // copy player's current grid
  const cellCageMap = buildCellCageMap(puzzle);
  const solutions = [];
  const state = { nodes: 0, nodeLimit: 1_000_000 };
  _solveCageOnly(testGrid, 0, puzzle, cellCageMap, solutions, 1, state);
  return solutions.length > 0 ? solutions[0] : currentPuzzle.solution;
}

function handleHint() {
  if (gameComplete || hintsUsed >= MAX_HINTS) return;

  // Find a valid completion that's consistent with the player's current work
  const hintSolution = solveFromCurrentGrid(currentPuzzle);

  // Find unfilled or wrong cells (not already hinted)
  const candidates = [];
  const total = currentPuzzle.size * currentPuzzle.size;
  for (let i = 0; i < total; i++) {
    if (!hintMask[i] && (grid[i] === 0 || grid[i] !== hintSolution[i])) {
      candidates.push(i);
    }
  }
  if (candidates.length === 0) return;

  // Pick a random candidate
  const idx = candidates[(Math.random() * candidates.length) | 0];
  grid[idx] = hintSolution[idx];
  hintMask[idx] = true;
  hintsUsed++;

  const ci = cageMap[idx];
  currentPuzzle.cages[ci].cells.forEach(i => updateCellDisplay(i));
  selectedCell = -1;

  document.getElementById('hint-count').textContent =
    `(${MAX_HINTS - hintsUsed} left)`;
  if (hintsUsed >= MAX_HINTS) {
    document.getElementById('hint-btn').style.opacity = '0.4';
    document.getElementById('hint-btn').disabled = true;
  }

  if (isPuzzleComplete(currentPuzzle, cageMap)) {
    clearInterval(timerInterval);
    gameComplete = true;
    setTimeout(showClearScreen, 400);
  }
}

/* ─────────────────────────────────────────
   TIMER
───────────────────────────────────────── */
function startTimer() {
  timerStart = Date.now();
  clearInterval(timerInterval);
  timerInterval = setInterval(() => {
    const secs = ((Date.now() - timerStart) / 1000) | 0;
    document.getElementById('timer').textContent = formatTime(secs);
  }, 1000);
}

function getElapsedSecs() {
  if (!timerStart) return 0;
  return ((Date.now() - timerStart) / 1000) | 0;
}

/* ─────────────────────────────────────────
   CLEAR SCREEN
───────────────────────────────────────── */
function showClearScreen() {
  const secs = getElapsedSecs();
  const wasDaily = isDailyMode; // capture before any resets
  const streak = wasDaily ? incrementStreak() : getStreak();
  document.getElementById('streak-num').textContent = streak;
  const diff = DIFFICULTY[currentDiff];

  document.getElementById('modal-sub').textContent =
    `Cagey · ${diff.label} ${diff.gridLabel} · #${puzzleNum}`;
  document.getElementById('modal-time').textContent = formatTime(secs);
  document.getElementById('modal-hints').textContent = hintsUsed;
  document.getElementById('modal-streak').textContent = streak;

  const shareText = buildShareText(puzzleNum, diff.label, secs, hintsUsed, streak, hintMask, diff.size);

  // Save daily completion
  if (wasDaily) {
    const key = 'cagey_daily_' + new Date().toISOString().slice(0, 10);
    localStorage.setItem(key, '1');
    localStorage.setItem(key + '_share', shareText);
  }
  isDailyMode = false;

  document.getElementById('share-preview').innerHTML =
    shareText.replace(/\n/g, '<br>');

  document.getElementById('modal').classList.remove('hidden');

  document.getElementById('share-btn').onclick = () => {
    if (navigator.share) {
      navigator.share({ text: shareText }).catch(() => {});
    } else {
      navigator.clipboard.writeText(shareText).then(() => {
        document.getElementById('share-btn').textContent = '✓ Copied!';
        setTimeout(() => { document.getElementById('share-btn').textContent = '📤 Share Result'; }, 2000);
      }).catch(() => {
        document.getElementById('share-btn').textContent = '⚠ Copy failed';
        setTimeout(() => { document.getElementById('share-btn').textContent = '📤 Share Result'; }, 2000);
      });
    }
  };
  document.getElementById('next-btn').onclick = () => {
    document.getElementById('modal').classList.add('hidden');
    newPuzzle(currentDiff);
  };
}

/* ─────────────────────────────────────────
   EXPERT BUNDLE FALLBACK
───────────────────────────────────────── */
let expertBundle = null;
let expertBundleIdx = 0;

async function loadExpertBundle() {
  if (expertBundle) return;
  try {
    const resp = await fetch('./src/expertBundle.json');
    if (resp.ok) {
      expertBundle = await resp.json();
      // Shuffle so repeated sessions get variety
      for (let i = expertBundle.length - 1; i > 0; i--) {
        const j = (Math.random() * (i + 1)) | 0;
        [expertBundle[i], expertBundle[j]] = [expertBundle[j], expertBundle[i]];
      }
    }
  } catch { /* offline or not available */ }
}

function getExpertFallback() {
  if (!expertBundle || expertBundle.length === 0) return null;
  const p = expertBundle[expertBundleIdx % expertBundle.length];
  expertBundleIdx++;
  return p;
}

/* ─────────────────────────────────────────
   NEW PUZZLE
───────────────────────────────────────── */
async function newPuzzle(diff) {
  isDailyMode = false;
  currentDiff = diff;

  // Update difficulty chips
  document.querySelectorAll('.diff-chip').forEach(c => {
    c.classList.toggle('active', c.dataset.diff === diff);
  });

  document.getElementById('loading').classList.remove('hidden');
  document.getElementById('timer').textContent = '0:00';

  // Use setTimeout to let the loading screen paint before heavy computation
  await new Promise(r => setTimeout(r, 50));

  if (diff === 'expert' && !expertBundle) await loadExpertBundle();

  let puzzle = generate(diff);
  if (!puzzle && diff === 'expert') puzzle = getExpertFallback();
  if (!puzzle) {
    document.getElementById('loading').classList.add('hidden');
    alert('Could not generate puzzle. Please try again.');
    return;
  }

  currentPuzzle = puzzle;
  cageBorders = computeCellBorders(puzzle);
  cageMap = getCageMap(puzzle);
  createState(puzzle);

  document.getElementById('grid-wrap').style.opacity = '1'; // reset if greyed from daily-already-solved
  renderGrid(puzzle, cageBorders, { grid });
  renderNumpad(puzzle.size);
  document.getElementById('hint-count').textContent = `(${MAX_HINTS} left)`;
  document.getElementById('hint-btn').style.opacity = '1';
  document.getElementById('hint-btn').disabled = false;

  puzzleNum = Math.floor(Math.random() * 9000) + 1; // random for free-play; daily uses real #

  startTimer();
  document.getElementById('loading').classList.add('hidden');
}

/* ─────────────────────────────────────────
   DAILY CHALLENGE MODE
───────────────────────────────────────── */
let isDailyMode = false;
let dailyAlreadySolved = false;

async function startDailyChallenge() {
  const { puzzleNum: num, diff, seed } = getDailyInfo();

  // Check if already solved today
  const key = 'cagey_daily_' + new Date().toISOString().slice(0, 10);
  const solved = localStorage.getItem(key);

  isDailyMode = true;
  puzzleNum = num;

  // Update chips
  document.querySelectorAll('.diff-chip').forEach(c => c.classList.remove('active'));
  document.querySelector('.diff-chip.daily').classList.add('active');

  document.getElementById('loading').classList.remove('hidden');
  document.getElementById('timer').textContent = '0:00';
  await new Promise(r => setTimeout(r, 50));

  if (diff === 'expert' && !expertBundle) await loadExpertBundle();

  let puzzle = generate(diff, seed);
  if (!puzzle && diff === 'expert') puzzle = getExpertFallback();
  if (!puzzle) {
    document.getElementById('loading').classList.add('hidden');
    alert('Could not load daily puzzle.');
    return;
  }

  currentDiff = diff;
  currentPuzzle = puzzle;
  cageBorders = computeCellBorders(puzzle);
  cageMap = getCageMap(puzzle);
  createState(puzzle);

  renderGrid(puzzle, cageBorders, { grid });
  renderNumpad(puzzle.size);
  document.getElementById('hint-count').textContent = `(${MAX_HINTS} left)`;
  document.getElementById('hint-btn').style.opacity = '1';
  document.getElementById('hint-btn').disabled = false;

  // Grey out grid if already solved
  if (solved) {
    dailyAlreadySolved = true;
    gameComplete = true;
    clearInterval(timerInterval);
    document.getElementById('grid-wrap').style.opacity = '0.5';
    document.getElementById('timer').textContent = '✓ Done';
    document.getElementById('loading').classList.add('hidden');
    setTimeout(() => {
      if (confirm('You already solved today\'s puzzle! 🎉\nOpen share text?')) {
        const shareText = localStorage.getItem(key + '_share') || 'Cagey daily completed!';
        navigator.clipboard.writeText(shareText)
          .then(() => alert('Copied to clipboard!'))
          .catch(() => alert('Could not copy – try again.'));
      }
    }, 300);
    return;
  }

  startTimer();
  document.getElementById('loading').classList.add('hidden');
}

/* ─────────────────────────────────────────
   KEYBOARD SUPPORT
───────────────────────────────────────── */
document.addEventListener('keydown', e => {
  if (e.key >= '1' && e.key <= '9') {
    const val = parseInt(e.key);
    if (val <= (currentPuzzle ? currentPuzzle.size : 0)) handleNumKey(val);
  } else if (e.key === 'Backspace' || e.key === 'Delete' || e.key === '0') {
    handleNumKey(0);
  } else if (e.key === 'z' && (e.ctrlKey || e.metaKey)) {
    e.preventDefault(); handleUndo();
  } else if (e.key === 'ArrowRight' && selectedCell >= 0) {
    const size = currentPuzzle.size;
    selectCell((selectedCell + 1) % (size * size));
  } else if (e.key === 'ArrowLeft' && selectedCell >= 0) {
    const size = currentPuzzle.size;
    selectCell((selectedCell - 1 + size * size) % (size * size));
  } else if (e.key === 'ArrowDown' && selectedCell >= 0) {
    const size = currentPuzzle.size;
    selectCell((selectedCell + size) % (size * size));
  } else if (e.key === 'ArrowUp' && selectedCell >= 0) {
    const size = currentPuzzle.size;
    selectCell((selectedCell - size + size * size) % (size * size));
  }
});

/* ─────────────────────────────────────────
   INIT
───────────────────────────────────────── */
document.getElementById('undo-btn').addEventListener('click', handleUndo);
document.getElementById('hint-btn').addEventListener('click', handleHint);
document.querySelectorAll('.diff-chip:not(.daily)').forEach(chip => {
  chip.addEventListener('click', () => {
    if (!chip.classList.contains('active')) {
      isDailyMode = false;
      newPuzzle(chip.dataset.diff);
    }
  });
});
document.querySelector('.diff-chip.daily').addEventListener('click', startDailyChallenge);

// Show current streak in header badge
document.getElementById('streak-num').textContent = getStreak();

// Re-render grid on orientation change / resize
let _resizeTimer;
window.addEventListener('resize', () => {
  clearTimeout(_resizeTimer);
  _resizeTimer = setTimeout(() => {
    if (currentPuzzle && cageBorders) {
      renderGrid(currentPuzzle, cageBorders, { grid });
      renderNumpad(currentPuzzle.size);
      refreshAllCells();
    }
  }, 150);
});

// Start with easy puzzle on load
newPuzzle('easy');
</script>
